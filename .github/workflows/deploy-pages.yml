name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/funny-brown-omnpI
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Assemble only the files the app needs. The source WAVs (57-80 MB each)
      # are excluded; the app plays the compressed book_01.mp3 instead.
      - name: Assemble site
        run: |
          mkdir -p _site/audiobook/chapters
          cp index.html app.js style.css .nojekyll _site/
          cp -r assets _site/
          cp audiobook/manifest.json _site/audiobook/
          cp audiobook/chapters/book_01.mp3 _site/audiobook/chapters/
          cp audiobook/chapters/book_01_meta.json _site/audiobook/chapters/
          cp -r audiobook/animations _site/audiobook/
          cp -r audiobook/illustrations _site/audiobook/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
