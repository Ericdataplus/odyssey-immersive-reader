name: Enable GitHub Pages (one-time)

on:
  workflow_dispatch:

permissions:
  pages: write
  contents: read

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable Pages with gh-pages branch
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}' \
            || echo 'Pages may already be enabled'
          echo "Pages should now be enabled at https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
